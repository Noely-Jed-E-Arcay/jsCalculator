<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Calculator</title>
</head>
<body>
    <div class="holder">
        <h1>Sum Calculator</h1>
        <div class="inputbox">
            <label>Enter First Number</label>
            <input type="text" id="num1"/>
        </div>
        <div class="inputbox">
            <label>Enter Second Number</label>
            <input type="text" id="num2"/>
        </div>

        <div class="inputbox">
            <label>Enter Third Number</label>
            <input type="text" id="num3"/>
        </div>
        
        <div class="btn">
            <button onClick="calculateSum()">+</button>
            <button onClick="calculateProduct()">x</button>
            <button onClick="calculateQuotient()">/</button>
            <button onClick="clear()"><strong>C</strong></button>
        </div>
        <p id="result">This is for the answer</p>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
